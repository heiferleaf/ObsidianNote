name: Deploy Quartz to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: quartz/package-lock.json

      - name: Sync notes into Quartz content
        shell: bash
        run: |
          # Preserve index.md if it exists
          INDEX_BACKUP=""
          if [ -f "quartz/content/index.md" ]; then
            INDEX_BACKUP=$(mktemp)
            cp quartz/content/index.md "$INDEX_BACKUP"
          fi

          rm -rf quartz/content/*
          cp -a 002-学习笔记 quartz/content/
          cp -a 003-Attachments quartz/content/

          # Restore index.md
          if [ -n "$INDEX_BACKUP" ] && [ -f "$INDEX_BACKUP" ]; then
            cp "$INDEX_BACKUP" quartz/content/index.md
            rm "$INDEX_BACKUP"
          fi

          # Exclude practice/homework folders from published notes
          find quartz/content/002-学习笔记 -type d \( -name '*练习*' -o -name '*作业*' \) -delete

          # Keep attachment images, drop Excalidraw markdown source notes from published content
          find quartz/content/003-Attachments -type f -name '*.excalidraw.md' -delete

      - name: Install dependencies
        working-directory: quartz
        run: npm ci

      - name: Build Quartz
        working-directory: quartz
        run: npx quartz build

      - name: Clean up RSS feed
        run: rm -f quartz/public/feed.xml quartz/public/feed.rss

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4