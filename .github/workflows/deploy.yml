name: Deploy Quartz to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: quartz/package-lock.json

      - name: Sync notes into Quartz content
        shell: bash
        run: |
          rm -rf quartz/content/*
          mkdir -p quartz/content
          cp -a "002-学习笔记" "quartz/content/"
          cp -a "003-Attachments" "quartz/content/"

          # Ensure home page exists for Quartz deployments.
          if [ -f "index.md" ]; then
            cp "index.md" "quartz/content/index.md"
          elif [ -f "000-Dashboard.md" ]; then
            cp "000-Dashboard.md" "quartz/content/index.md"
          else
            cat > "quartz/content/index.md" << 'EOF'
            ---
            title: 首页
            ---

            欢迎来到我的学习笔记网站。
            EOF
          fi

      - name: Install dependencies
        working-directory: quartz
        run: npm ci

      - name: Build Quartz
        working-directory: quartz
        run: node ./quartz/bootstrap-cli.mjs build

      - name: Clean up generated files
        run: |
          # 删除所有 RSS/Feed 文件
          find quartz/public -name 'index.xml' -delete 2>/dev/null || true
          find quartz/public -name 'feed.xml' -delete 2>/dev/null || true
          find quartz/public -name 'feed.rss' -delete 2>/dev/null || true
          find quartz/public -name '*.rss' -delete 2>/dev/null || true
          find quartz/public -type d \( -name '*练习*' -o -name '*作业*' \) -exec rm -rf {} + 2>/dev/null || true
          find quartz/public -type f -name '*.excalidraw.md' -delete 2>/dev/null || true          
          # 创建 .nojekyll 文件禁用 Jekyll 处理
          touch quartz/public/.nojekyll

          # 验证首页存在
          if [ ! -f quartz/public/index.html ]; then
            echo "ERROR: index.html not found"
            exit 1
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: quartz/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4